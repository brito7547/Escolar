<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Horário</title>
  <link rel="manifest" href="/Escolar/manifest.json">
  <meta name="theme-color" content="#0f172a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Horário">
  <link rel="apple-touch-icon" href="/Escolar/icons/icon-192.png">
  <style>
    :root {
      --bg: #0b1120; --surface: #141e2e; --surface2: #1a2540;
      --border: #243050; --text: #e2e8f0; --muted: #64748b;
      --accent: #38bdf8; --accent-dim: #0ea5e930;
      --danger: #f87171; --success: #34d399; --warn: #fbbf24;
      --radius: 14px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: var(--bg); color: var(--text);
      min-height: 100dvh;
      padding-bottom: calc(72px + env(safe-area-inset-bottom));
    }
    /* NAV */
    .bottom-nav {
      position: fixed; bottom: 0; left: 0; right: 0;
      height: calc(64px + env(safe-area-inset-bottom));
      padding-bottom: env(safe-area-inset-bottom);
      background: var(--surface); border-top: 1px solid var(--border);
      display: flex; z-index: 100;
    }
    .nav-btn {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 3px;
      background: none; border: none; color: var(--muted);
      font-size: 11px; cursor: pointer; transition: color .15s;
      padding-bottom: 2px; position: relative;
    }
    .nav-btn svg { width: 22px; height: 22px; }
    .nav-btn.active { color: var(--accent); }
    .nav-btn .badge {
      position: absolute; top: 8px;
      background: var(--danger); color: white;
      font-size: 10px; font-weight: 700; border-radius: 99px;
      padding: 1px 5px; min-width: 16px; text-align: center; line-height: 14px;
    }
    /* PAGES */
    .page { display: none; padding: 0 0 16px; }
    .page.active { display: block; }
    .page-header {
      padding: 20px 16px 12px; font-size: 22px;
      font-weight: 700; letter-spacing: -.5px;
    }
    .page-header span { color: var(--accent); }
    /* DIAS */
    .dias-scroll {
      display: flex; gap: 8px; padding: 0 16px 4px;
      overflow-x: auto; scrollbar-width: none;
    }
    .dias-scroll::-webkit-scrollbar { display: none; }
    .btn-dia {
      flex: none; padding: 8px 16px; border-radius: 99px;
      border: 1px solid var(--border); background: var(--surface);
      color: var(--muted); font-size: 13px; font-weight: 600;
      cursor: pointer; transition: all .15s; white-space: nowrap;
    }
    .btn-dia.ativo { background: var(--accent); border-color: var(--accent); color: #0b1120; }
    /* CARDS */
    .container { padding: 12px 16px; display: flex; flex-direction: column; gap: 12px; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; }
    .card-title {
      font-size: 12px; font-weight: 700; letter-spacing: .08em;
      text-transform: uppercase; color: var(--muted); margin-bottom: 12px;
    }
    .aula-item {
      display: flex; align-items: center; gap: 10px;
      padding: 7px 0; border-bottom: 1px solid var(--border); font-size: 14px;
    }
    .aula-item:last-child { border-bottom: none; }
    .aula-num { font-size: 11px; color: var(--muted); width: 18px; text-align: right; flex-shrink: 0; }
    .livro-tag {
      display: inline-flex; align-items: center; gap: 5px;
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 8px; padding: 5px 10px; font-size: 13px; margin: 3px;
    }
    /* FORMS */
    .add-form { display: flex; gap: 8px; padding: 0 16px 12px; }
    .add-form input, .add-form select {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 10px; color: var(--text); padding: 10px 12px;
      font-size: 14px; outline: none; transition: border-color .15s;
    }
    .add-form input:focus, .add-form select:focus { border-color: var(--accent); }
    .add-form input { flex: 1; }
    .add-form select { width: 130px; flex-shrink: 0; }
    .btn-add {
      background: var(--accent); color: #0b1120; border: none;
      border-radius: 10px; width: 42px; height: 42px; font-size: 22px;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; font-weight: 700;
    }
    /* TAREFAS */
    .tarefa-item {
      display: flex; align-items: flex-start; gap: 10px;
      padding: 10px 0; border-bottom: 1px solid var(--border);
    }
    .tarefa-item:last-child { border-bottom: none; }
    .tarefa-check {
      width: 20px; height: 20px; border-radius: 6px;
      border: 2px solid var(--border); background: none;
      cursor: pointer; flex-shrink: 0; display: flex;
      align-items: center; justify-content: center;
      transition: all .15s; margin-top: 1px;
    }
    .tarefa-check.done { background: var(--success); border-color: var(--success); }
    .tarefa-info { flex: 1; }
    .tarefa-titulo { font-size: 14px; line-height: 1.4; transition: opacity .2s; }
    .tarefa-titulo.done { text-decoration: line-through; opacity: .45; }
    .tarefa-meta { display: flex; gap: 8px; margin-top: 3px; align-items: center; flex-wrap: wrap; }
    .tag-materia {
      font-size: 11px; background: var(--accent-dim); color: var(--accent);
      border-radius: 5px; padding: 1px 6px; font-weight: 600;
    }
    .tag-prazo { font-size: 11px; color: var(--muted); }
    .tag-prazo.urgente { color: var(--danger); font-weight: 600; }
    .tag-prazo.hoje { color: var(--warn); font-weight: 600; }
    .tarefa-del {
      background: none; border: none; color: var(--muted);
      cursor: pointer; font-size: 16px; padding: 2px 4px;
      border-radius: 6px; opacity: 0; transition: opacity .15s;
    }
    .tarefa-item:hover .tarefa-del { opacity: 1; }
    .tarefa-del:hover { color: var(--danger); }
    /* always show del on touch */
    @media (hover: none) { .tarefa-del { opacity: .4; } }
    .empty-state { text-align: center; padding: 32px 16px; color: var(--muted); font-size: 14px; }
    .filter-row {
      display: flex; gap: 6px; padding: 0 16px 10px;
      overflow-x: auto; scrollbar-width: none;
    }
    .filter-row::-webkit-scrollbar { display: none; }
    .filter-chip {
      flex: none; padding: 5px 12px; border-radius: 99px;
      border: 1px solid var(--border); background: none;
      color: var(--muted); font-size: 12px; font-weight: 600;
      cursor: pointer; white-space: nowrap;
    }
    .filter-chip.active { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); }
    /* SALA */
    .sala-setup { padding: 16px; display: flex; flex-direction: column; gap: 12px; }
    .sala-input-group { display: flex; flex-direction: column; gap: 6px; }
    .sala-input-group label { font-size: 12px; color: var(--muted); font-weight: 600; text-transform: uppercase; letter-spacing: .05em; }
    .sala-input {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 10px; color: var(--text); padding: 12px 14px;
      font-size: 15px; outline: none; width: 100%; transition: border-color .15s;
    }
    .sala-input:focus { border-color: var(--accent); }
    .btn-primary {
      background: var(--accent); color: #0b1120; border: none;
      border-radius: 10px; padding: 13px; font-size: 15px;
      font-weight: 700; cursor: pointer; width: 100%; transition: opacity .15s;
    }
    .btn-primary:hover { opacity: .85; }
    .btn-secondary {
      background: var(--surface); color: var(--text);
      border: 1px solid var(--border); border-radius: 10px;
      padding: 12px; font-size: 14px; font-weight: 600; cursor: pointer; width: 100%;
    }
    .divider { display: flex; align-items: center; gap: 10px; color: var(--muted); font-size: 12px; }
    .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }
    .sala-header {
      padding: 12px 16px; background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
    }
    .sala-nome { font-size: 15px; font-weight: 700; }
    .sala-codigo {
      font-size: 12px; color: var(--muted); background: var(--surface2);
      border: 1px solid var(--border); border-radius: 6px;
      padding: 3px 8px; cursor: pointer; user-select: none;
    }
    .sala-codigo:hover { border-color: var(--accent); color: var(--accent); }
    .online-dot { width: 8px; height: 8px; background: var(--success); border-radius: 50%; display: inline-block; margin-right: 4px; }
    .autor-tag { font-size: 11px; color: var(--muted); }
    /* SALA TABS */
    .sala-tabs {
      display: flex; border-bottom: 1px solid var(--border);
      background: var(--surface);
    }
    .sala-tab {
      flex: 1; padding: 10px; background: none; border: none;
      color: var(--muted); font-size: 13px; font-weight: 600;
      cursor: pointer; border-bottom: 2px solid transparent;
      transition: all .15s;
    }
    .sala-tab.active { color: var(--accent); border-bottom-color: var(--accent); }
    .sala-tab-pane { display: none; }
    .sala-tab-pane.active { display: block; }
    /* CHAT */
    .chat-msgs {
      padding: 12px 16px; display: flex; flex-direction: column;
      gap: 10px; flex: 1; overflow-y: auto; min-height: 0;
    }
    #sala-pane-chat {
      display: none; flex-direction: column;
      height: calc(100dvh - 64px - env(safe-area-inset-bottom) - 110px);
    }
    #sala-pane-chat.active { display: flex; }
    .chat-msg { display: flex; flex-direction: column; gap: 2px; max-width: 85%; }
    .chat-msg.mine { align-self: flex-end; align-items: flex-end; }
    .chat-msg.other { align-self: flex-start; align-items: flex-start; }
    .chat-bubble {
      padding: 8px 12px; border-radius: 14px;
      font-size: 14px; line-height: 1.4; word-break: break-word; position: relative;
    }
    .chat-msg.mine .chat-bubble { background: var(--accent); color: #0b1120; border-bottom-right-radius: 4px; }
    .chat-msg.other .chat-bubble { background: var(--surface2); border: 1px solid var(--border); border-bottom-left-radius: 4px; }
    .chat-meta { font-size: 10px; color: var(--muted); padding: 0 4px; display: flex; gap: 6px; align-items: center; }
    .chat-editado { font-size: 10px; font-style: italic; opacity: .6; }
    .chat-reply-preview {
      font-size: 12px; padding: 5px 10px; border-radius: 8px; margin-bottom: 4px;
      border-left: 3px solid var(--accent); background: var(--surface2); color: var(--muted);
      max-width: 100%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .chat-msg.mine .chat-reply-preview { background: #0b1120; border-left-color: #0b1120; color: #0b1120; opacity: .6; }
    .chat-actions {
      display: flex; gap: 4px; opacity: 0; transition: opacity .15s;
      margin-top: 2px;
    }
    .chat-msg:hover .chat-actions { opacity: 1; }
    @media (hover: none) { .chat-actions { opacity: 1; } }
    .chat-action-btn {
      background: var(--surface2); border: 1px solid var(--border);
      color: var(--muted); border-radius: 6px; padding: 2px 7px;
      font-size: 11px; cursor: pointer; transition: all .15s;
    }
    .chat-action-btn:hover { border-color: var(--accent); color: var(--accent); }
    .chat-action-btn.del:hover { border-color: var(--danger); color: var(--danger); }
    .reply-bar {
      display: none; align-items: center; gap: 8px;
      padding: 6px 16px 0; font-size: 12px; color: var(--muted);
    }
    .reply-bar.active { display: flex; }
    .reply-bar-text { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .reply-bar-cancel { background: none; border: none; color: var(--muted); font-size: 18px; cursor: pointer; }
    .edit-bar {
      display: none; align-items: center; gap: 8px;
      padding: 4px 16px 0; font-size: 12px; color: var(--warn);
    }
    .edit-bar.active { display: flex; }
    .edit-bar-cancel { background: none; border: none; color: var(--muted); font-size: 18px; cursor: pointer; }
    .chat-input-row { display: flex; gap: 8px; padding: 6px 16px 12px; }
    .chat-input-row input {
      flex: 1; background: var(--surface); border: 1px solid var(--border);
      border-radius: 22px; color: var(--text); padding: 10px 16px;
      font-size: 14px; outline: none; transition: border-color .15s;
    }
    .chat-input-row input:focus { border-color: var(--accent); }
    .btn-send {
      background: var(--accent); color: #0b1120; border: none;
      border-radius: 50%; width: 40px; height: 40px; font-size: 18px;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    /* CALENDARIO */
    .cal-grid {
      display: grid; grid-template-columns: repeat(7, 1fr);
      gap: 2px; padding: 0 16px 8px;
    }
    .cal-day-header { text-align: center; font-size: 11px; color: var(--muted); padding: 4px 0; font-weight: 600; }
    .cal-day {
      aspect-ratio: 1; display: flex; align-items: center; justify-content: center;
      border-radius: 8px; font-size: 13px; cursor: pointer;
      position: relative; transition: background .15s;
    }
    .cal-day:hover { background: var(--surface2); }
    .cal-day.hoje { background: var(--accent); color: #0b1120; font-weight: 700; }
    .cal-day.tem-tarefa::after {
      content: ''; position: absolute; bottom: 3px; left: 50%;
      transform: translateX(-50%); width: 4px; height: 4px;
      border-radius: 50%; background: var(--warn);
    }
    .cal-day.hoje.tem-tarefa::after { background: #0b1120; }
    .cal-day.outro-mes { color: var(--muted); opacity: .4; }
    .cal-nav {
      display: flex; align-items: center; justify-content: space-between;
      padding: 8px 16px 4px;
    }
    .cal-nav-btn {
      background: none; border: none; color: var(--muted);
      font-size: 20px; cursor: pointer; padding: 4px 8px;
    }
    .cal-mes { font-size: 15px; font-weight: 700; }
    .cal-tarefas-dia { padding: 0 16px 12px; }
    .cal-tarefas-titulo { font-size: 12px; color: var(--muted); font-weight: 700; text-transform: uppercase; letter-spacing: .08em; margin-bottom: 8px; }
    /* ENTREGAS */
    .add-entrega-form { padding: 0 16px 12px; display: flex; flex-direction: column; gap: 8px; }
    .add-entrega-form input, .add-entrega-form select {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 10px; color: var(--text); padding: 10px 12px;
      font-size: 14px; outline: none; width: 100%;
    }
    .add-entrega-form input:focus, .add-entrega-form select:focus { border-color: var(--accent); }
    .add-entrega-row { display: flex; gap: 8px; }
    .add-entrega-row input[type=date] { flex: 1; }
    /* MODAL */
    .modal-overlay { position: fixed; inset: 0; background: #00000090; z-index: 200; display: flex; align-items: flex-end; }
    .modal-overlay.hidden { display: none; }
    .modal {
      background: var(--surface); border-radius: var(--radius) var(--radius) 0 0;
      padding: 24px 16px calc(24px + env(safe-area-inset-bottom));
      width: 100%; display: flex; flex-direction: column; gap: 14px;
      max-height: 85vh; overflow-y: auto;
    }
    .modal h3 { font-size: 17px; }
    .modal p { font-size: 13px; color: var(--muted); line-height: 1.6; }
    .modal-close { background: none; border: none; color: var(--muted); font-size: 22px; cursor: pointer; align-self: flex-end; margin-bottom: -8px; }
    .section-sep { height: 1px; background: var(--border); margin: 4px 0; }
    /* SKELETON */
    .skeleton {
      background: linear-gradient(90deg, var(--surface2) 25%, var(--border) 50%, var(--surface2) 75%);
      background-size: 200% 100%; animation: shimmer 1.5s infinite;
      border-radius: 8px; height: 36px; margin: 6px 0;
    }
    @keyframes shimmer { to { background-position: -200% 0; } }
    /* TOAST */
    .toast {
      position: fixed;
      bottom: calc(72px + 12px + env(safe-area-inset-bottom));
      left: 50%; transform: translateX(-50%) translateY(20px);
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 10px; padding: 10px 16px; font-size: 13px;
      opacity: 0; transition: all .3s; z-index: 150;
      white-space: nowrap; pointer-events: none;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    /* CROWN */
    .crown { font-size: 12px; margin-left: 3px; }
    @media (prefers-reduced-motion: reduce) { * { animation: none !important; transition: none !important; } }
  </style>
</head>
<body>

<div class="toast" id="toast"></div>

<!-- ══ PAGE: HORÁRIO ══ -->
<div class="page active" id="page-horario">
  <div class="page-header">Hoje: <span id="titulo-dia">—</span></div>
  <div class="dias-scroll" id="botoesDias"></div>
  <div class="container">
    <div class="card">
      <div class="card-title">Aulas do dia</div>
      <div id="lista-aulas"></div>
    </div>
    <div class="card">
      <div class="card-title">Levar livros</div>
      <div id="lista-livros" style="display:flex;flex-wrap:wrap;gap:0;margin:-3px;"></div>
    </div>
  </div>
</div>

<!-- ══ PAGE: TAREFAS ══ -->
<div class="page" id="page-tarefas">
  <div class="page-header">Atividades</div>
  <div class="add-form">
    <input type="text" id="input-tarefa" placeholder="Nova atividade..." maxlength="120">
    <select id="select-materia">
      <option value="">Matéria</option>
      <option>Redação</option><option>Português</option><option>Matemática</option>
      <option>História</option><option>Geografia</option><option>Biologia</option>
      <option>Química</option><option>Física</option><option>Filosofia</option>
      <option>Sociologia</option><option>Inglês</option><option>Arte</option>
      <option>Ed. Física</option><option>Formação Cidadã</option>
      <option>C. Natureza ENEM</option><option>C. Humanas ENEM</option>
      <option>Linguagens ENEM</option><option>Matemática ENEM</option><option>Outro</option>
    </select>
    <button class="btn-add" id="btn-add-tarefa">+</button>
  </div>
  <div class="filter-row" id="filtros"></div>
  <div class="container" style="padding-top:4px;">
    <div class="card"><div id="lista-tarefas"></div></div>
  </div>
</div>

<!-- ══ PAGE: CALENDÁRIO ══ -->
<div class="page" id="page-calendario">
  <div class="page-header">Calendário</div>
  <div class="cal-nav">
    <button class="cal-nav-btn" id="cal-prev">‹</button>
    <div class="cal-mes" id="cal-mes-titulo"></div>
    <button class="cal-nav-btn" id="cal-next">›</button>
  </div>
  <div class="cal-grid" id="cal-grid"></div>
  <div class="cal-tarefas-dia container" style="padding-top:0;">
    <div class="card">
      <div class="cal-tarefas-titulo" id="cal-dia-titulo">Selecione um dia</div>
      <div id="cal-lista-dia"></div>
    </div>
    <div class="card">
      <div class="card-title">Nova entrega</div>
      <div class="add-entrega-form">
        <input type="text" id="input-entrega-titulo" placeholder="Descrição da entrega..." maxlength="120">
        <select id="select-entrega-materia">
          <option value="">Matéria</option>
          <option>Redação</option><option>Português</option><option>Matemática</option>
          <option>História</option><option>Geografia</option><option>Biologia</option>
          <option>Química</option><option>Física</option><option>Filosofia</option>
          <option>Sociologia</option><option>Inglês</option><option>Arte</option>
          <option>Ed. Física</option><option>Formação Cidadã</option>
          <option>C. Natureza ENEM</option><option>C. Humanas ENEM</option>
          <option>Linguagens ENEM</option><option>Matemática ENEM</option><option>Outro</option>
        </select>
        <div class="add-entrega-row">
          <input type="date" id="input-entrega-data">
          <button class="btn-add" id="btn-add-entrega">+</button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- ══ PAGE: SALA ══ -->
<div class="page" id="page-sala">
  <!-- Setup -->
  <div id="sala-setup-screen">
    <div class="page-header">Sala</div>
    <div class="sala-setup">
      <div class="sala-input-group">
        <label>Seu nome</label>
        <input class="sala-input" type="text" id="input-nome-usuario" placeholder="Ex: Ana, Brito..." maxlength="30">
      </div>
      <div class="section-sep"></div>
      <button class="btn-primary" id="btn-criar-sala">Criar nova sala</button>
      <div class="divider">ou entrar em uma existente</div>
      <div class="sala-input-group">
        <label>Código da sala</label>
        <input class="sala-input" type="text" id="input-codigo" placeholder="Ex: ABC123" maxlength="8" style="text-transform:uppercase;letter-spacing:.1em;">
      </div>
      <button class="btn-secondary" id="btn-entrar-sala">Entrar na sala</button>
    </div>
  </div>

  <!-- Sala ativa -->
  <div id="sala-ativa-screen" style="display:none;">
    <div class="sala-header">
      <div>
        <div class="sala-nome" id="sala-nome-display">—</div>
        <div style="font-size:12px;margin-top:2px;">
          <span class="online-dot"></span><span id="sala-membros">ao vivo</span>
        </div>
      </div>
      <div style="display:flex;gap:8px;align-items:center;">
        <div class="sala-codigo" id="sala-codigo-display" title="Copiar código">—</div>
        <button id="btn-sair-sala" style="background:none;border:none;color:var(--muted);font-size:20px;cursor:pointer;">↩</button>

function renderCalendario() {
  const ano = calDate.getFullYear();
  const mes = calDate.getMonth();
  const meses = ["Janeiro","Fevereiro","Março","Abril","Maio","Junho","Julho","Agosto","Setembro","Outubro","Novembro","Dezembro"];
  document.getElementById("cal-mes-titulo").textContent = `${meses[mes]} ${ano}`;

  const hoje = new Date(); hoje.setHours(0,0,0,0);
  const primeiro = new Date(ano, mes, 1);
  const ultimo = new Date(ano, mes+1, 0);
  const inicioSemana = primeiro.getDay();

  // Datas com entregas neste mês
  const datasComEntrega = new Set(
    entregas.filter(e => {
      const d = new Date(e.data + "T00:00:00");
      return d.getFullYear() === ano && d.getMonth() === mes;
    }).map(e => new Date(e.data + "T00:00:00").getDate())
  );

  const dias = ["D","S","T","Q","Q","S","S"];
  let html = dias.map(d => `<div class="cal-day-header">${d}</div>`).join("");

  for (let i = 0; i < inicioSemana; i++) {
    const dia = ultimo.getDate() - inicioSemana + 1 + i;
    html += `<div class="cal-day outro-mes">${dia}</div>`;
  }
  for (let d = 1; d <= ultimo.getDate(); d++) {
    const dData = new Date(ano, mes, d);
    const isHoje = dData.getTime() === hoje.getTime();
    const temEntrega = datasComEntrega.has(d);
    const selecionado = calDiaSelecionado &&
      calDiaSelecionado.getFullYear() === ano &&
      calDiaSelecionado.getMonth() === mes &&
      calDiaSelecionado.getDate() === d;
    let cls = "cal-day";
    if (isHoje) cls += " hoje";
    if (temEntrega) cls += " tem-tarefa";
    if (selecionado && !isHoje) cls += ""; // could add selected style
    html += `<div class="${cls}" onclick="selecionarDia(${ano},${mes},${d})">${d}</div>`;
  }

  document.getElementById("cal-grid").innerHTML = html;
  if (calDiaSelecionado) renderEntregasDia(calDiaSelecionado);
}

function selecionarDia(ano, mes, dia) {
  calDiaSelecionado = new Date(ano, mes, dia);
  document.getElementById("input-entrega-data").value =
    `${ano}-${String(mes+1).padStart(2,"0")}-${String(dia).padStart(2,"0")}`;
  renderCalendario();
  renderEntregasDia(calDiaSelecionado);
}

  document.getElementById("cal-dia-titulo").textContent =
    `${data.getDate()} de ${meses[data.getMonth()]}`;
  const lista = entregas.filter(e => e.data === str);
  const div = document.getElementById("cal-lista-dia");
  if (!lista.length) {
    div.innerHTML = `<div class="empty-state" style="padding:16px;">Nenhuma entrega neste dia</div>`;

  div.innerHTML = lista.map(e => `

        </div>
      </div>
      <button class="tarefa-del" onclick="deletarEntrega('${e.id}')">✕</button>

}

function isAdmin() { return nomeUsuario.toLowerCase() === ADMIN_NOME.toLowerCase(); }

async function sbFetch(path, opts = {}) {
  const res = await fetch(sbUrl + "/rest/v1" + path, {
    headers: {
      "apikey": sbKey, "Authorization": "Bearer " + sbKey,
      "Content-Type": "application/json",
      "Prefer": opts.prefer || "return=representation",
      ...opts.headers
    },
    method: opts.method || "GET",
    body: opts.body ? JSON.stringify(opts.body) : undefined
  });
  if (!res.ok) throw new Error(await res.text());
  if (res.status === 204) return null;
  return res.json();
}

    const editadoHtml = r.editada ? `<span class="chat-editado">(editado)</span>` : "";
    const acoesHtml = `<div class="chat-actions">
      <button class="chat-action-btn" onclick="iniciarReply('${r.id}','${escAttr(r.autor)}','${escAttr(r.mensagem)}')">↩ Reply</button>
      ${minha ? `<button class="chat-action-btn" onclick="iniciarEdicao('${r.id}','${escAttr(r.mensagem)}')">✏️ Editar</button>` : ""}
      ${podeApagarMsg(r.autor) ? `<button class="chat-action-btn del" onclick="apagarMsg('${r.id}')">🗑</button>` : ""}
    </div>`;
    return `<div class="chat-msg ${minha?"mine":"other"}" id="msg-${r.id}">
      <div class="chat-meta">${escHtml(r.autor||"?")}${isAdmin_?" 👑":""}</div>
      ${replyHtml}
      <div class="chat-bubble">${escHtml(r.mensagem)}</div>
      <div class="chat-meta">${hora}${editadoHtml}</div>
      ${acoesHtml}
    </div>`;
  }).join("");
  if (eraNoFundo) div.scrollTop = div.scrollHeight;
}

function iniciarReply(id, autor, mensagem) {
  replyTo = { id, autor, mensagem };
  editandoId = null;
  document.getElementById("reply-bar").classList.add("active");
  document.getElementById("edit-bar").classList.remove("active");
  document.getElementById("reply-bar-text").textContent = autor + ": " + mensagem;
  document.getElementById("input-chat").focus();
}
function cancelarReply() {
  replyTo = null;
  document.getElementById("reply-bar").classList.remove("active");
}
function iniciarEdicao(id, mensagemAtual) {
  editandoId = id;
  replyTo = null;
  document.getElementById("edit-bar").classList.add("active");
  document.getElementById("reply-bar").classList.remove("active");
  const inp = document.getElementById("input-chat");
  inp.value = mensagemAtual;
  inp.focus();
}
function cancelarEdicao() {
  editandoId = null;
  document.getElementById("edit-bar").classList.remove("active");
  document.getElementById("input-chat").value = "";
}

async function apagarMsg(id) {
  try {
    await sbFetch(`/sala_chat?id=eq.${id}`, { method: "DELETE", prefer: "return=minimal" });
    ultimoMsgId = null;
    await carregarChat(true);
  } catch(e) { showToast("Erro ao apagar"); }
}

async function enviarMensagem() {
  const txt = document.getElementById("input-chat").value.trim();
  if (!txt || !salaId) return;
  document.getElementById("input-chat").value = "";

  // Modo edição
  if (editandoId) {
    try {
      await sbFetch(`/sala_chat?id=eq.${editandoId}`, {
        method: "PATCH",
        body: { mensagem: txt, editada: true }
      });
      cancelarEdicao();
      ultimoMsgId = null;
      await carregarChat(true);
    } catch(e) { showToast("Erro ao editar"); }
    return;
  }

  // Mensagem normal ou reply
  const body = { sala_id: salaId, autor: nomeUsuario, mensagem: txt };
  if (replyTo) {
    body.reply_to = replyTo.id;
    body.reply_preview = replyTo.autor + ": " + replyTo.mensagem.slice(0, 60);
  }
  try {
    await sbFetch("/sala_chat", { method: "POST", body });
    cancelarReply();
    await carregarChat(true);
    document.getElementById("chat-msgs").scrollTop = 99999;
  } catch(e) { showToast("Erro ao enviar"); }
}

function escAttr(s) {
  return String(s).replace(/'/g,"\'").replace(/"/g,"&quot;").replace(/</g,"&lt;");
}

document.getElementById("btn-send-chat").onclick = enviarMensagem;
document.getElementById("input-chat").addEventListener("keydown", e => {
  if (e.key === "Enter") enviarMensagem();
  if (e.key === "Escape") { cancelarReply(); cancelarEdicao(); }
});

// ── Sala setup/entrar ──
function salaTab(tab) {
  document.querySelectorAll(".sala-tab").forEach((b,i) => {
    const tabs = ["tarefas","chat"];
    b.classList.toggle("active", tabs[i] === tab);
  });
  document.querySelectorAll(".sala-tab-pane").forEach(p => p.classList.remove("active"));
  document.getElementById("sala-pane-" + tab).classList.add("active");
  if (tab === "chat") { carregarChat(); document.getElementById("chat-msgs").scrollTop = 99999; }
}

function entrarSala(id, apelido) {
  salaId = id; salaApelido = apelido;
  localStorage.setItem("sala_id", id);
  localStorage.setItem("sala_apelido", apelido);
  document.getElementById("sala-setup-screen").style.display = "none";
  document.getElementById("sala-ativa-screen").style.display = "block";
  document.getElementById("sala-nome-display").textContent = "Sala " + apelido +
    (isAdmin() ? " 👑" : "");
  const codeEl = document.getElementById("sala-codigo-display");
  codeEl.textContent = apelido;
  codeEl.onclick = () => navigator.clipboard?.writeText(apelido).then(() => showToast("Código copiado!"));
  carregarSalaTarefas();
  carregarChat();
  clearInterval(pollInterval); clearInterval(chatPollInterval);
  pollInterval = setInterval(carregarSalaTarefas, 5000);
  chatPollInterval = setInterval(carregarChat, 3000);
}

function sairSala() {
  clearInterval(pollInterval); clearInterval(chatPollInterval);
  salaId = ""; salaApelido = "";
  localStorage.removeItem("sala_id"); localStorage.removeItem("sala_apelido");
  document.getElementById("sala-setup-screen").style.display = "block";
  document.getElementById("sala-ativa-screen").style.display = "none";
}

document.getElementById("btn-criar-sala").onclick = () => {
  nomeUsuario = document.getElementById("input-nome-usuario").value.trim();
  if (!nomeUsuario) { showToast("Coloca seu nome primeiro"); return; }
  localStorage.setItem("nome_usuario", nomeUsuario);
  const codigo = gerarCodigo();
  entrarSala(codigo, codigo);
  showToast("Sala criada! Código: " + codigo);
};

document.getElementById("btn-entrar-sala").onclick = () => {
  nomeUsuario = document.getElementById("input-nome-usuario").value.trim();
  if (!nomeUsuario) { showToast("Coloca seu nome primeiro"); return; }
  localStorage.setItem("nome_usuario", nomeUsuario);
  const codigo = document.getElementById("input-codigo").value.trim().toUpperCase();
  if (!codigo) { showToast("Coloca o código da sala"); return; }
  entrarSala(codigo, codigo);
};

document.getElementById("btn-sair-sala").onclick = sairSala;

if (nomeUsuario) document.getElementById("input-nome-usuario").value = nomeUsuario;
if (salaId) setTimeout(() => entrarSala(salaId, salaApelido), 100);

// ══ NAV ══
function navTo(page) {
  document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
  document.querySelectorAll(".nav-btn").forEach(b => b.classList.remove("active"));
  document.getElementById("page-" + page).classList.add("active");
  document.getElementById("nav-" + page).classList.add("active");
}

// ══ UTILS ══
function uid() { return Math.random().toString(36).slice(2) + Date.now().toString(36); }
function gerarCodigo() { return Math.random().toString(36).slice(2, 8).toUpperCase(); }
function escHtml(s) {
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}
let toastTimer;
function showToast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg; t.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove("show"), 2500);
}
</script>

      .catch(err => console.error('SW erro:', err));

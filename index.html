<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Horário</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0f172a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Horário">
  <link rel="apple-touch-icon" href="icon-192.png">
  <style>
    :root {
      --bg: #0b1120; --surface: #141e2e; --surface2: #1a2540;
      --border: #243050; --text: #e2e8f0; --muted: #64748b;
      --accent: #38bdf8; --accent-dim: #0ea5e930;
      --danger: #f87171; --success: #34d399; --warn: #fbbf24;
      --radius: 14px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: var(--bg); color: var(--text);
      min-height: 100dvh;
      padding-bottom: calc(72px + env(safe-area-inset-bottom));
    }
    .bottom-nav {
      position: fixed; bottom: 0; left: 0; right: 0;
      height: calc(64px + env(safe-area-inset-bottom));
      padding-bottom: env(safe-area-inset-bottom);
      background: var(--surface); border-top: 1px solid var(--border);
      display: flex; z-index: 100;
    }
    .nav-btn {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 3px;
      background: none; border: none; color: var(--muted);
      font-size: 11px; cursor: pointer; transition: color .15s;
      padding-bottom: 2px; position: relative;
    }
    .nav-btn svg { width: 22px; height: 22px; }
    .nav-btn.active { color: var(--accent); }
    .nav-btn .badge {
      position: absolute; top: 8px;
      background: var(--danger); color: white;
      font-size: 10px; font-weight: 700; border-radius: 99px;
      padding: 1px 5px; min-width: 16px; text-align: center; line-height: 14px;
    }
    .page { display: none; padding: 0 0 16px; }
    .page.active { display: block; }
    .page-header { padding: 20px 16px 12px; font-size: 22px; font-weight: 700; letter-spacing: -.5px; }
    .page-header span { color: var(--accent); }
    .dias-scroll { display: flex; gap: 8px; padding: 0 16px 4px; overflow-x: auto; scrollbar-width: none; }
    .dias-scroll::-webkit-scrollbar { display: none; }
    .btn-dia {
      flex: none; padding: 8px 16px; border-radius: 99px;
      border: 1px solid var(--border); background: var(--surface);
      color: var(--muted); font-size: 13px; font-weight: 600;
      cursor: pointer; transition: all .15s; white-space: nowrap;
    }
    .btn-dia.ativo { background: var(--accent); border-color: var(--accent); color: #0b1120; }
    .container { padding: 12px 16px; display: flex; flex-direction: column; gap: 12px; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; }
    .card-title { font-size: 12px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; color: var(--muted); margin-bottom: 12px; }
    .aula-item { display: flex; align-items: center; gap: 10px; padding: 7px 0; border-bottom: 1px solid var(--border); font-size: 14px; }
    .aula-item:last-child { border-bottom: none; }
    .aula-num { font-size: 11px; color: var(--muted); width: 18px; text-align: right; flex-shrink: 0; }
    .livro-tag { display: inline-flex; align-items: center; gap: 5px; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 5px 10px; font-size: 13px; margin: 3px; }
    .add-form { display: flex; gap: 8px; padding: 0 16px 12px; }
    .add-form input, .add-form select {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 10px; color: var(--text); padding: 10px 12px;
      font-size: 14px; outline: none; transition: border-color .15s;
    }
    .add-form input:focus, .add-form select:focus { border-color: var(--accent); }
    .add-form input { flex: 1; }
    .add-form select { width: 130px; flex-shrink: 0; }
    .btn-add {
      background: var(--accent); color: #0b1120; border: none;
      border-radius: 10px; width: 42px; height: 42px; font-size: 22px;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; font-weight: 700;
    }
    .tarefa-item { display: flex; align-items: flex-start; gap: 10px; padding: 10px 0; border-bottom: 1px solid var(--border); }
    .tarefa-item:last-child { border-bottom: none; }
    .tarefa-check {
      width: 20px; height: 20px; border-radius: 6px; border: 2px solid var(--border);
      background: none; cursor: pointer; flex-shrink: 0; display: flex;
      align-items: center; justify-content: center; transition: all .15s; margin-top: 1px;
    }
    .tarefa-check.done { background: var(--success); border-color: var(--success); }
    .tarefa-info { flex: 1; }
    .tarefa-titulo { font-size: 14px; line-height: 1.4; transition: opacity .2s; }
    .tarefa-titulo.done { text-decoration: line-through; opacity: .45; }
    .tarefa-meta { display: flex; gap: 8px; margin-top: 3px; align-items: center; flex-wrap: wrap; }
    .tag-materia { font-size: 11px; background: var(--accent-dim); color: var(--accent); border-radius: 5px; padding: 1px 6px; font-weight: 600; }
    .tag-prazo { font-size: 11px; color: var(--muted); }
    .tag-prazo.urgente { color: var(--danger); font-weight: 600; }
    .tag-prazo.hoje { color: var(--warn); font-weight: 600; }
    .tarefa-del { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 16px; padding: 2px 4px; border-radius: 6px; opacity: 0; transition: opacity .15s; }
    .tarefa-item:hover .tarefa-del { opacity: 1; }
    .tarefa-del:hover { color: var(--danger); }
    @media (hover: none) { .tarefa-del { opacity: .4; } }
    .empty-state { text-align: center; padding: 32px 16px; color: var(--muted); font-size: 14px; }
    .filter-row { display: flex; gap: 6px; padding: 0 16px 10px; overflow-x: auto; scrollbar-width: none; }
    .filter-row::-webkit-scrollbar { display: none; }
    .filter-chip { flex: none; padding: 5px 12px; border-radius: 99px; border: 1px solid var(--border); background: none; color: var(--muted); font-size: 12px; font-weight: 600; cursor: pointer; white-space: nowrap; }
    .filter-chip.active { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); }
    /* SALA */
    .sala-setup { padding: 16px; display: flex; flex-direction: column; gap: 12px; }
    .sala-input-group { display: flex; flex-direction: column; gap: 6px; }
    .sala-input-group label { font-size: 12px; color: var(--muted); font-weight: 600; text-transform: uppercase; letter-spacing: .05em; }
    .sala-input { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; color: var(--text); padding: 12px 14px; font-size: 15px; outline: none; width: 100%; transition: border-color .15s; }
    .sala-input:focus { border-color: var(--accent); }
    .btn-primary { background: var(--accent); color: #0b1120; border: none; border-radius: 10px; padding: 13px; font-size: 15px; font-weight: 700; cursor: pointer; width: 100%; transition: opacity .15s; }
    .btn-primary:hover { opacity: .85; }
    .btn-secondary { background: var(--surface); color: var(--text); border: 1px solid var(--border); border-radius: 10px; padding: 12px; font-size: 14px; font-weight: 600; cursor: pointer; width: 100%; }
    .divider { display: flex; align-items: center; gap: 10px; color: var(--muted); font-size: 12px; }
    .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }
    .sala-header { padding: 12px 16px; background: var(--surface); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
    .sala-nome { font-size: 15px; font-weight: 700; }
    .sala-codigo { font-size: 12px; color: var(--muted); background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; padding: 3px 8px; cursor: pointer; user-select: none; }
    .sala-codigo:hover { border-color: var(--accent); color: var(--accent); }
    .online-dot { width: 8px; height: 8px; background: var(--success); border-radius: 50%; display: inline-block; margin-right: 4px; }
    .autor-tag { font-size: 11px; color: var(--muted); }
    .sala-tabs { display: flex; border-bottom: 1px solid var(--border); background: var(--surface); }
    .sala-tab { flex: 1; padding: 10px; background: none; border: none; color: var(--muted); font-size: 13px; font-weight: 600; cursor: pointer; border-bottom: 2px solid transparent; transition: all .15s; }
    .sala-tab.active { color: var(--accent); border-bottom-color: var(--accent); }
    .sala-tab-pane { display: none; }
    .sala-tab-pane.active { display: block; }
    /* PRESENÇA */
    .presenca-lista { display: flex; flex-wrap: wrap; gap: 8px; padding: 10px 16px 4px; }
    .presenca-chip { display: flex; align-items: center; gap: 6px; background: var(--surface2); border: 1px solid var(--border); border-radius: 99px; padding: 4px 10px; font-size: 12px; cursor: default; }
    .presenca-chip.banivel { cursor: pointer; }
    .presenca-chip.banivel:hover { border-color: var(--danger); }
    .presenca-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
    .presenca-dot.online { background: var(--success); }
    .presenca-dot.offline { background: var(--muted); }
    /* CHAT */
    .chat-msgs { padding: 12px 16px; display: flex; flex-direction: column; gap: 10px; flex: 1; overflow-y: auto; min-height: 0; }
    #sala-pane-chat { display: none; flex-direction: column; height: calc(100dvh - 64px - env(safe-area-inset-bottom) - 130px); }
    #sala-pane-chat.active { display: flex; }
    .chat-msg { display: flex; flex-direction: column; gap: 2px; max-width: 85%; user-select: none; touch-action: pan-y; transition: transform .15s; }
    .chat-msg.mine { align-self: flex-end; align-items: flex-end; }
    .chat-msg.other { align-self: flex-start; align-items: flex-start; }
    .chat-bubble { padding: 8px 12px; border-radius: 14px; font-size: 14px; line-height: 1.4; word-break: break-word; position: relative; }
    .chat-msg.mine .chat-bubble { background: var(--accent); color: #0b1120; border-bottom-right-radius: 4px; }
    .chat-msg.other .chat-bubble { background: var(--surface2); border: 1px solid var(--border); border-bottom-left-radius: 4px; }
    .chat-meta { font-size: 10px; color: var(--muted); padding: 0 4px; display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
    .chat-editado { font-size: 10px; font-style: italic; opacity: .6; }
    .chat-reply-preview { font-size: 12px; padding: 5px 10px; border-radius: 8px; margin-bottom: 4px; border-left: 3px solid var(--accent); background: var(--surface2); color: var(--muted); max-width: 100%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .chat-msg.mine .chat-reply-preview { background: rgba(0,0,0,.2); border-left-color: rgba(0,0,0,.3); color: rgba(0,0,0,.6); }
    /* Context menu */
    .ctx-menu {
      position: fixed; background: var(--surface2); border: 1px solid var(--border);
      border-radius: 12px; padding: 6px; z-index: 300; min-width: 160px;
      box-shadow: 0 8px 32px #00000060;
    }
    .ctx-menu.hidden { display: none; }
    .ctx-item {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 12px; border-radius: 8px; cursor: pointer;
      font-size: 14px; transition: background .1s;
    }
    .ctx-item:hover { background: var(--border); }
    .ctx-item.danger { color: var(--danger); }
    .ctx-item .ctx-icon { font-size: 16px; width: 20px; text-align: center; }
    /* Read receipts */
    .read-receipt { display: inline-flex; align-items: center; gap: 2px; cursor: pointer; margin-left: 4px; }
    .read-tick { font-size: 11px; color: var(--muted); }
    .read-tick.seen { color: var(--accent); }
    /* Reply/edit bars */
    .reply-bar { display: none; align-items: center; gap: 8px; padding: 6px 16px 0; font-size: 12px; color: var(--muted); border-top: 1px solid var(--border); }
    .reply-bar.active { display: flex; }
    .reply-bar-text { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .reply-bar-cancel { background: none; border: none; color: var(--muted); font-size: 18px; cursor: pointer; }
    .edit-bar { display: none; align-items: center; gap: 8px; padding: 4px 16px 0; font-size: 12px; color: var(--warn); border-top: 1px solid var(--border); }
    .edit-bar.active { display: flex; }
    .edit-bar-cancel { background: none; border: none; color: var(--muted); font-size: 18px; cursor: pointer; }
    .chat-input-row { display: flex; gap: 8px; padding: 6px 16px 12px; }
    .chat-input-row input { flex: 1; background: var(--surface); border: 1px solid var(--border); border-radius: 22px; color: var(--text); padding: 10px 16px; font-size: 14px; outline: none; transition: border-color .15s; }
    .chat-input-row input:focus { border-color: var(--accent); }
    .btn-send { background: var(--accent); color: #0b1120; border: none; border-radius: 50%; width: 40px; height: 40px; font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    /* Visto por tooltip */
    .visto-modal { position: fixed; inset: 0; background: #00000070; z-index: 250; display: flex; align-items: flex-end; }
    .visto-modal.hidden { display: none; }
    .visto-box { background: var(--surface); border-radius: var(--radius) var(--radius) 0 0; padding: 20px 16px calc(24px + env(safe-area-inset-bottom)); width: 100%; }
    .visto-title { font-size: 14px; font-weight: 700; margin-bottom: 12px; }
    .visto-list { display: flex; flex-direction: column; gap: 6px; }
    .visto-item { font-size: 13px; color: var(--muted); display: flex; align-items: center; gap: 8px; }
    /* CALENDÁRIO */
    .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; padding: 0 16px 8px; }
    .cal-day-header { text-align: center; font-size: 11px; color: var(--muted); padding: 4px 0; font-weight: 600; }
    .cal-day { aspect-ratio: 1; display: flex; align-items: center; justify-content: center; border-radius: 8px; font-size: 13px; cursor: pointer; position: relative; transition: background .15s; }
    .cal-day:hover { background: var(--surface2); }
    .cal-day.hoje { background: var(--accent); color: #0b1120; font-weight: 700; }
    .cal-day.tem-tarefa::after { content: ''; position: absolute; bottom: 3px; left: 50%; transform: translateX(-50%); width: 4px; height: 4px; border-radius: 50%; background: var(--warn); }
    .cal-day.hoje.tem-tarefa::after { background: #0b1120; }
    .cal-day.outro-mes { color: var(--muted); opacity: .4; }
    .cal-nav { display: flex; align-items: center; justify-content: space-between; padding: 8px 16px 4px; }
    .cal-nav-btn { background: none; border: none; color: var(--muted); font-size: 20px; cursor: pointer; padding: 4px 8px; }
    .cal-mes { font-size: 15px; font-weight: 700; }
    .add-entrega-form { padding: 0 16px 12px; display: flex; flex-direction: column; gap: 8px; }
    .add-entrega-form input, .add-entrega-form select { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; color: var(--text); padding: 10px 12px; font-size: 14px; outline: none; width: 100%; }
    .add-entrega-form input:focus, .add-entrega-form select:focus { border-color: var(--accent); }
    .add-entrega-row { display: flex; gap: 8px; }
    .add-entrega-row input[type=date] { flex: 1; }
    /* CONFIRM DIALOG */
    .confirm-overlay { position: fixed; inset: 0; background: #00000080; z-index: 400; display: flex; align-items: center; justify-content: center; padding: 24px; }
    .confirm-overlay.hidden { display: none; }
    .confirm-box { background: var(--surface); border-radius: var(--radius); padding: 24px; width: 100%; max-width: 320px; }
    .confirm-box h4 { font-size: 16px; margin-bottom: 8px; }
    .confirm-box p { font-size: 13px; color: var(--muted); margin-bottom: 20px; line-height: 1.5; }
    .confirm-btns { display: flex; gap: 10px; }
    .confirm-btns button { flex: 1; padding: 11px; border-radius: 10px; font-size: 14px; font-weight: 600; cursor: pointer; border: none; }
    .confirm-cancel { background: var(--surface2); color: var(--text); }
    .confirm-ok { background: var(--danger); color: white; }
    /* SKELETON */
    .skeleton { background: linear-gradient(90deg, var(--surface2) 25%, var(--border) 50%, var(--surface2) 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; border-radius: 8px; height: 36px; margin: 6px 0; }
    @keyframes shimmer { to { background-position: -200% 0; } }
    .section-sep { height: 1px; background: var(--border); margin: 4px 0; }
    .toast { position: fixed; bottom: calc(72px + 12px + env(safe-area-inset-bottom)); left: 50%; transform: translateX(-50%) translateY(20px); background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 10px 16px; font-size: 13px; opacity: 0; transition: all .3s; z-index: 150; white-space: nowrap; pointer-events: none; }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    @media (prefers-reduced-motion: reduce) { * { animation: none !important; transition: none !important; } }
    .nav-btn .notif-badge {
      position: absolute; top: 6px; right: 10px;
      background: var(--danger); color: white;
      font-size: 9px; font-weight: 700; border-radius: 99px;
      padding: 1px 4px; min-width: 14px; text-align: center; line-height: 14px;
      display: none;
    }
  </style>
</head>
<body>

<div class="toast" id="toast"></div>

<!-- Context Menu -->
<div class="ctx-menu hidden" id="ctx-menu">
  <div class="ctx-item" id="ctx-reply"><span class="ctx-icon">↩</span> Responder</div>
  <div class="ctx-item" id="ctx-edit"><span class="ctx-icon">✍︎</span> Editar</div>
  <div class="ctx-item danger" id="ctx-delete"><span class="ctx-icon">⌫</span> Apagar</div>
</div>

<!-- Visto por modal -->
<div class="visto-modal hidden" id="visto-modal" onclick="fecharVistoModal()">
  <div class="visto-box" onclick="event.stopPropagation()">
    <div class="visto-title">Visto por</div>
    <div class="visto-list" id="visto-list"></div>
  </div>
</div>

<!-- Confirm dialog -->
<div class="confirm-overlay hidden" id="confirm-overlay">
  <div class="confirm-box">
    <h4 id="confirm-title">Confirmar</h4>
    <p id="confirm-msg"></p>
    <div class="confirm-btns">
      <button class="confirm-cancel" onclick="confirmarNao()">Cancelar</button>
      <button class="confirm-ok" id="confirm-ok-btn" onclick="confirmarSim()">Confirmar</button>
    </div>
  </div>
</div>

<!-- ══ PAGE: HORÁRIO ══ -->
<div class="page active" id="page-horario">
  <div class="page-header">Hoje: <span id="titulo-dia">—</span></div>
  <div class="dias-scroll" id="botoesDias"></div>
  <div class="container">
    <div class="card">
      <div class="card-title">Aulas do dia</div>
      <div id="lista-aulas"></div>
    </div>
    <div class="card">
      <div class="card-title">Levar livros</div>
      <div id="lista-livros" style="display:flex;flex-wrap:wrap;gap:0;margin:-3px;"></div>
    </div>
  </div>
</div>

<!-- ══ PAGE: TAREFAS ══ -->
<div class="page" id="page-tarefas">
  <div class="page-header">Atividades</div>
  <div class="add-form">
    <input type="text" id="input-tarefa" placeholder="Nova atividade..." maxlength="120">
    <select id="select-materia">
      <option value="">Matéria</option>
      <option>Redação</option><option>Português</option><option>Matemática</option>
      <option>História</option><option>Geografia</option><option>Biologia</option>
      <option>Química</option><option>Física</option><option>Filosofia</option>
      <option>Sociologia</option><option>Inglês</option><option>Arte</option>
      <option>Ed. Física</option><option>Formação Cidadã</option>
      <option>C. Natureza ENEM</option><option>C. Humanas ENEM</option>
      <option>Linguagens ENEM</option><option>Matemática ENEM</option><option>Outro</option>
    </select>
    <button class="btn-add" id="btn-add-tarefa">+</button>
  </div>
  <div class="filter-row" id="filtros"></div>
  <div class="container" style="padding-top:4px;">
    <div class="card"><div id="lista-tarefas"></div></div>
  </div>
</div>

<!-- ══ PAGE: CALENDÁRIO ══ -->
<div class="page" id="page-calendario">
  <div class="page-header">Calendário</div>
  <div class="cal-nav">
    <button class="cal-nav-btn" id="cal-prev">‹</button>
    <div class="cal-mes" id="cal-mes-titulo"></div>
    <button class="cal-nav-btn" id="cal-next">›</button>
  </div>
  <div class="cal-grid" id="cal-grid"></div>
  <div class="container" style="padding-top:0;">
    <div class="card">
      <div class="card-title" id="cal-dia-titulo">Selecione um dia</div>
      <div id="cal-lista-dia"></div>
    </div>
    <div class="card">
      <div class="card-title">Nova entrega</div>
      <div class="add-entrega-form">
        <input type="text" id="input-entrega-titulo" placeholder="Descrição da entrega..." maxlength="120">
        <select id="select-entrega-materia">
          <option value="">Matéria</option>
          <option>Redação</option><option>Português</option><option>Matemática</option>
          <option>História</option><option>Geografia</option><option>Biologia</option>
          <option>Química</option><option>Física</option><option>Filosofia</option>
          <option>Sociologia</option><option>Inglês</option><option>Arte</option>
          <option>Ed. Física</option><option>Formação Cidadã</option>
          <option>C. Natureza ENEM</option><option>C. Humanas ENEM</option>
          <option>Linguagens ENEM</option><option>Matemática ENEM</option><option>Outro</option>
        </select>
        <div class="add-entrega-row">
          <input type="date" id="input-entrega-data">
          <button class="btn-add" id="btn-add-entrega">+</button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- ══ PAGE: SALA ══ -->

// ══ CALENDÁRIO ══
let entregas = JSON.parse(localStorage.getItem("entregas") || "[]");
let calDate = new Date();
let calDiaSelecionado = null;
function salvarEntregas() { localStorage.setItem("entregas", JSON.stringify(entregas)); renderCalendario(); }
function renderCalendario() {
  const ano = calDate.getFullYear(), mes = calDate.getMonth();
  const meses = ["Janeiro","Fevereiro","Março","Abril","Maio","Junho","Julho","Agosto","Setembro","Outubro","Novembro","Dezembro"];
  document.getElementById("cal-mes-titulo").textContent = `${meses[mes]} ${ano}`;
  const hoje = new Date(); hoje.setHours(0,0,0,0);
  const primeiro = new Date(ano, mes, 1), ultimo = new Date(ano, mes+1, 0);
  const datasComEntrega = new Set(entregas.filter(e => { const d = new Date(e.data+"T00:00:00"); return d.getFullYear()===ano&&d.getMonth()===mes; }).map(e => new Date(e.data+"T00:00:00").getDate()));
  const dias = ["D","S","T","Q","Q","S","S"];
  let html = dias.map(d => `<div class="cal-day-header">${d}</div>`).join("");
  for (let i = 0; i < primeiro.getDay(); i++) html += `<div class="cal-day outro-mes">${ultimo.getDate()-primeiro.getDay()+1+i}</div>`;
  for (let d = 1; d <= ultimo.getDate(); d++) {
    const isHoje = new Date(ano,mes,d).getTime()===hoje.getTime();

function deletarEntrega(id) { entregas = entregas.filter(e => e.id !== id); salvarEntregas(); }

let salaApelido = localStorage.getItem("sala_apelido") || "";
let nomeUsuario = localStorage.getItem("nome_usuario") || "";

async function sbFetch(path, opts = {}) {
  const res = await fetch(sbUrl + "/rest/v1" + path, {
    headers: { "apikey": sbKey, "Authorization": "Bearer "+sbKey, "Content-Type": "application/json", "Prefer": opts.prefer||"return=representation", ...opts.headers },
    method: opts.method||"GET", body: opts.body ? JSON.stringify(opts.body) : undefined
  });
  if (!res.ok) throw new Error(await res.text());
  if (res.status === 204) return null;
  return res.json();
}

// ── Notificações ──
let notifPermissao = localStorage.getItem("notif_perm") || "default";
let ultimoNotifMsgId = null;
let ultimaNotifTarefaTs = null;

async function pedirPermissaoNotif() {
  if (!("Notification" in window)) return;
  if (Notification.permission === "granted") { notifPermissao = "granted"; return; }
  if (Notification.permission !== "denied") {
    const p = await Notification.requestPermission();
    notifPermissao = p;
    localStorage.setItem("notif_perm", p);
  }
}

function dispararNotif(titulo, corpo, tag) {
  if (Notification.permission !== "granted") return;
  if (document.visibilityState === "visible") return; // só se app em background
  new Notification(titulo, { body: corpo, icon: "icon-192.png", tag });
}

// Som de notificação via Web Audio API
function tocarSom() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.frequency.setValueAtTime(880, ctx.currentTime);
    osc.frequency.setValueAtTime(1100, ctx.currentTime + 0.1);
    gain.gain.setValueAtTime(0.3, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.3);
    osc.start(ctx.currentTime); osc.stop(ctx.currentTime + 0.3);
  } catch(e) {}
}

let notifTarefaCount = 0;

  if (!salaId) return;
  try {
    const rows = await sbFetch(`/sala_chat?sala_id=eq.${salaId}&order=criado_em.desc&limit=5`);

    const nova = rows[0];
    if (!ultimoNotifMsgId) { ultimoNotifMsgId = nova.id; return; }
    if (nova.id === ultimoNotifMsgId) return;
    const novas = rows.filter(r => r.autor !== nomeUsuario);
    if (novas.length > 0) {
      ultimoNotifMsgId = nova.id;

      const chatAberto = document.getElementById("sala-pane-chat").classList.contains("active") &&
                         document.getElementById("page-sala").classList.contains("active");
      if (!chatAberto) {
        tocarSom();
        notifMsgCount++;
        atualizarBadgeSala();
        // vibrar se disponível
        if (navigator.vibrate) navigator.vibrate([100, 50, 100]);
      }
    } else {
      ultimoNotifMsgId = nova.id;
    }
  } catch(e) {}
}

async function checarNovasTarefas() {
  if (!salaId) return;
  try {
    const rows = await sbFetch(`/sala_tarefas?sala_id=eq.${salaId}&order=criado_em.desc&limit=3`);
    if (!rows || !rows.length) return;
    const nova = rows[0];
    const ts = nova.criado_em;
    if (!ultimaNotifTarefaTs) { ultimaNotifTarefaTs = ts; return; }
    if (ts === ultimaNotifTarefaTs) return;
    const novas = rows.filter(r => r.criado_em > ultimaNotifTarefaTs && r.autor !== nomeUsuario);
    if (novas.length > 0) {
      ultimaNotifTarefaTs = ts;
      const salaAberta = document.getElementById("page-sala").classList.contains("active");
      if (!salaAberta) {
        notifTarefaCount++;
        atualizarBadgeSala();
        if (navigator.vibrate) navigator.vibrate(200);
      }
      showToast(`Nova atividade: ${novas[0].titulo}`);
    } else { ultimaNotifTarefaTs = ts; }
  } catch(e) {}
}

async function carregarBanidos() {
  if (!salaId) return;
  try {
    const rows = await sbFetch(`/sala_banidos?sala_id=eq.${salaId}`);
    banidos = new Set((rows||[]).map(r => r.nome.toLowerCase()));
    // Se eu estiver banido, sair da sala
    if (banidos.has(nomeUsuario.toLowerCase()) && !isAdmin()) {
      sairSala(true);
      showToast("Você foi removido da sala ☠︎");
    }
  } catch(e) {}
}

async function banirUsuario(nome) {
  if (!isAdmin()) return;
  confirmar(`Remover ${nome}?`, `${nome} será removido da sala e não poderá mais entrar com este nome.`, async () => {
    try {
      await sbFetch("/sala_banidos", { method: "POST", body: { sala_id: salaId, nome } });
      showToast(`${nome} removido ☠︎`);
      carregarBanidos(); carregarPresenca();
    } catch(e) { showToast("Erro ao remover"); }
  });
}

// ── Tarefas da sala ──
async function carregarSalaTarefas() {
  if (!salaId) return;
  try {
    const rows = await sbFetch(`/sala_tarefas?sala_id=eq.${salaId}&order=criado_em.asc`);
    renderSalaTarefas(rows||[]);
  } catch(e) {}
}

function podeRemover(autorTarefa) { return isAdmin() || autorTarefa === nomeUsuario; }

function renderSalaTarefas(rows) {
  const div = document.getElementById("lista-sala-tarefas");
  if (!rows.length) { div.innerHTML = `<div class="empty-state">Sala vazia — adicione a primeira atividade!</div>`; return; }
  div.innerHTML = rows.map(r => `
    <div class="tarefa-item">
      <button class="tarefa-check ${r.feita?"done":""}" onclick="toggleSalaTarefa('${r.id}',${r.feita})">
        ${r.feita?`<svg width="12" height="12" viewBox="0 0 12 12"><polyline points="1.5,6 5,9.5 10.5,2.5" stroke="white" stroke-width="2" fill="none"/></svg>`:""}
      </button>
      <div class="tarefa-info">
        <div class="tarefa-titulo ${r.feita?"done":""}">${escHtml(r.titulo)}</div>
        <div class="tarefa-meta">
          ${r.materia?`<span class="tag-materia">${escHtml(r.materia)}</span>`:""}
          <span class="autor-tag">por ${escHtml(nomeComTag(r.autor||"?"))}</span>
        </div>
      </div>
      ${podeRemover(r.autor)?`<button class="tarefa-del" onclick="deletarSalaTarefa('${r.id}')">✕</button>`:""}
    </div>`).join("");
}

async function toggleSalaTarefa(id, feita) {
  try { await sbFetch(`/sala_tarefas?id=eq.${id}`, { method:"PATCH", body:{ feita:!feita } }); carregarSalaTarefas(); } catch(e) { showToast("Erro"); }
}
async function deletarSalaTarefa(id) {
  try { await sbFetch(`/sala_tarefas?id=eq.${id}`, { method:"DELETE", prefer:"return=minimal" }); carregarSalaTarefas(); } catch(e) { showToast("Erro"); }
}
document.getElementById("btn-add-sala-tarefa").onclick = async () => {
  const titulo = document.getElementById("input-sala-tarefa").value.trim();
  if (!titulo) return;
  try {
    await sbFetch("/sala_tarefas", { method:"POST", body:{ sala_id:salaId, titulo, materia:document.getElementById("select-sala-materia").value||null, autor:nomeUsuario, feita:false } });
    document.getElementById("input-sala-tarefa").value = "";
    await carregarSalaTarefas(); showToast("Adicionado!");
  } catch(e) { showToast("Erro ao adicionar"); }
};
document.getElementById("input-sala-tarefa").addEventListener("keydown", e => { if (e.key==="Enter") document.getElementById("btn-add-sala-tarefa").click(); });

// ── Chat ──
let replyTo = null, editandoId = null;
let ctxMsgId = null, ctxMsgAutor = null, ctxMsgTexto = null;

async function carregarChat(forcar = false) {
  if (!salaId) return;
  try {
    const rows = await sbFetch(`/sala_chat?sala_id=eq.${salaId}&order=criado_em.asc&limit=100`);
    if (!rows) return;
    const ultimo = rows.length ? rows[rows.length-1].id : null;
    if (!forcar && ultimo === ultimoMsgId) return;
    ultimoMsgId = ultimo;
    renderChat(rows);
    // marcar lidas
    marcarLidas(rows);
  } catch(e) {}
}

async function marcarLidas(rows) {
  if (!rows || !rows.length || !nomeUsuario) return;
  // pega mensagens de outros que ainda não marquei como lida
  try {
    const leituras = await sbFetch(`/msg_leituras?sala_id=eq.${salaId}&nome=eq.${encodeURIComponent(nomeUsuario)}`);
    const jaLidas = new Set((leituras||[]).map(l => l.msg_id));
    const paraMarcar = rows.filter(r => r.autor !== nomeUsuario && !jaLidas.has(r.id));
    for (const r of paraMarcar) {
      await sbFetch("/msg_leituras", { method:"POST", prefer:"resolution=merge-duplicates,return=minimal", headers:{"Prefer":"resolution=merge-duplicates,return=minimal"}, body:{ msg_id:r.id, sala_id:salaId, nome:nomeUsuario } }).catch(()=>{});
    }
  } catch(e) {}
}

async function verVistoPor(msgId) {
  try {
    const rows = await sbFetch(`/msg_leituras?msg_id=eq.${msgId}`);
    const div = document.getElementById("visto-list");
    if (!rows || !rows.length) { div.innerHTML = `<div style="color:var(--muted);font-size:13px;">Ninguém viu ainda</div>`; }
    else {
      div.innerHTML = rows.map(r => `<div class="visto-item"><span style="color:var(--accent)">✔︎</span> ${escHtml(nomeComTag(r.nome))} <span style="margin-left:auto;font-size:11px;">${new Date(r.lido_em).toLocaleTimeString("pt-BR",{hour:"2-digit",minute:"2-digit"})}</span></div>`).join("");
    }
    document.getElementById("visto-modal").classList.remove("hidden");
  } catch(e) { showToast("Erro ao carregar"); }
}
function fecharVistoModal() { document.getElementById("visto-modal").classList.add("hidden"); }

function renderChat(rows) {
  const div = document.getElementById("chat-msgs");
  const eraNoFundo = div.scrollHeight - div.scrollTop <= div.clientHeight + 40;
  if (!rows.length) { div.innerHTML = `<div class="empty-state">Nenhuma mensagem ainda</div>`; return; }
  div.innerHTML = rows.map(r => {
    const minha = r.autor === nomeUsuario;
    const hora = new Date(r.criado_em).toLocaleTimeString("pt-BR",{hour:"2-digit",minute:"2-digit"});
    const replyHtml = r.reply_preview ? `<div class="chat-reply-preview">↩ ${escHtml(r.reply_preview)}</div>` : "";
    const editadoHtml = r.editada ? `<span class="chat-editado">(editado)</span>` : "";
    const tickHtml = minha ? `<span class="read-receipt" onclick="verVistoPor('${r.id}')" title="Ver quem viu"><span class="read-tick seen">✔︎✔︎</span></span>` : "";
    return `<div class="chat-msg ${minha?"mine":"other"}" id="msg-${r.id}"
      data-id="${r.id}" data-autor="${escAttr(r.autor)}" data-texto="${escAttr(r.mensagem)}" data-minha="${minha}">
      <div class="chat-meta">${escHtml(nomeComTag(r.autor||"?"))}</div>
      ${replyHtml}
      <div class="chat-bubble">${escHtml(r.mensagem)}</div>
      <div class="chat-meta">${hora}${editadoHtml}${tickHtml}</div>
    </div>`;
  }).join("");
  if (eraNoFundo) div.scrollTop = div.scrollHeight;
  // bind long press + swipe
  div.querySelectorAll(".chat-msg").forEach(el => bindMsgGestures(el));
}

// ── Gestures: long press + swipe reply ──
function bindMsgGestures(el) {
  let pressTimer = null;
  let startX = 0, swipeDone = false;

  // Long press
  el.addEventListener("pointerdown", e => {
    startX = e.clientX; swipeDone = false;
    pressTimer = setTimeout(() => { abrirCtxMenu(el, e.clientX, e.clientY); }, 500);
  });
  el.addEventListener("pointermove", e => {
    const dx = e.clientX - startX;
    if (Math.abs(dx) > 8) clearTimeout(pressTimer);
    // swipe para reply (arrastar direita)
    if (dx > 50 && !swipeDone) {
      swipeDone = true;
      el.style.transform = "translateX(30px)";
      setTimeout(() => { el.style.transform = ""; }, 300);
      iniciarReply(el.dataset.id, el.dataset.autor, el.dataset.texto);
    }
  });
  el.addEventListener("pointerup", () => clearTimeout(pressTimer));
  el.addEventListener("pointercancel", () => clearTimeout(pressTimer));
}

function abrirCtxMenu(el, x, y) {
  ctxMsgId = el.dataset.id;
  ctxMsgAutor = el.dataset.autor;
  ctxMsgTexto = el.dataset.texto;
  const minha = el.dataset.minha === "true";
  const menu = document.getElementById("ctx-menu");
  document.getElementById("ctx-edit").style.display = minha ? "flex" : "none";
  const podeDel = minha || isAdmin();
  document.getElementById("ctx-delete").style.display = podeDel ? "flex" : "none";
  menu.classList.remove("hidden");
  // Position
  const vw = window.innerWidth, vh = window.innerHeight;
  let left = x, top = y + 8;
  if (left + 180 > vw) left = vw - 188;
  if (top + 160 > vh) top = y - 160;
  menu.style.left = left + "px"; menu.style.top = top + "px";
}

document.getElementById("ctx-reply").onclick = () => {
  document.getElementById("ctx-menu").classList.add("hidden");
  iniciarReply(ctxMsgId, ctxMsgAutor, ctxMsgTexto);
};
document.getElementById("ctx-edit").onclick = () => {
  document.getElementById("ctx-menu").classList.add("hidden");
  iniciarEdicao(ctxMsgId, ctxMsgTexto);
};
document.getElementById("ctx-delete").onclick = () => {
  document.getElementById("ctx-menu").classList.add("hidden");
  confirmar("Apagar mensagem?", "Esta ação não pode ser desfeita.", () => apagarMsg(ctxMsgId));
};
document.addEventListener("click", e => {
  if (!document.getElementById("ctx-menu").contains(e.target)) document.getElementById("ctx-menu").classList.add("hidden");
});

function iniciarReply(id, autor, mensagem) {
  replyTo = { id, autor, mensagem }; editandoId = null;
  document.getElementById("reply-bar").classList.add("active");
  document.getElementById("edit-bar").classList.remove("active");
  document.getElementById("reply-bar-text").textContent = autor + ": " + mensagem;
  document.getElementById("input-chat").focus();
}
function cancelarReply() { replyTo = null; document.getElementById("reply-bar").classList.remove("active"); }
function iniciarEdicao(id, texto) {
  editandoId = id; replyTo = null;
  document.getElementById("edit-bar").classList.add("active");
  document.getElementById("reply-bar").classList.remove("active");
  const inp = document.getElementById("input-chat");
  inp.value = texto; inp.focus();
}
function cancelarEdicao() { editandoId = null; document.getElementById("edit-bar").classList.remove("active"); document.getElementById("input-chat").value = ""; }

async function apagarMsg(id) {
  try { await sbFetch(`/sala_chat?id=eq.${id}`, { method:"DELETE", prefer:"return=minimal" }); ultimoMsgId = null; await carregarChat(true); } catch(e) { showToast("Erro ao apagar"); }
}

async function enviarMensagem() {
  const txt = document.getElementById("input-chat").value.trim();
  if (!txt || !salaId) return;
  document.getElementById("input-chat").value = "";
  if (editandoId) {
    try { await sbFetch(`/sala_chat?id=eq.${editandoId}`, { method:"PATCH", body:{ mensagem:txt, editada:true } }); cancelarEdicao(); ultimoMsgId = null; await carregarChat(true); } catch(e) { showToast("Erro ao editar"); }
    return;
  }
  const body = { sala_id:salaId, autor:nomeUsuario, mensagem:txt };
  if (replyTo) { body.reply_to = replyTo.id; body.reply_preview = replyTo.autor+": "+replyTo.mensagem.slice(0,60); }
  try { await sbFetch("/sala_chat", { method:"POST", body }); cancelarReply(); await carregarChat(true); document.getElementById("chat-msgs").scrollTop = 99999; } catch(e) { showToast("Erro ao enviar"); }
}
document.getElementById("btn-send-chat").onclick = enviarMensagem;
document.getElementById("input-chat").addEventListener("keydown", e => {
  if (e.key === "Enter") enviarMensagem();
  if (e.key === "Escape") { cancelarReply(); cancelarEdicao(); }
});

// ── Presença ──
async function registrarPresenca() {
  if (!salaId || !nomeUsuario) return;
  try { await sbFetch("/sala_presenca", { method:"POST", prefer:"resolution=merge-duplicates,return=minimal", headers:{"Prefer":"resolution=merge-duplicates,return=minimal"}, body:{ sala_id:salaId, nome:nomeUsuario, visto_em:new Date().toISOString() } }); } catch(e) {}
}
async function carregarPresenca() {
  if (!salaId) return;
  try { const rows = await sbFetch(`/sala_presenca?sala_id=eq.${salaId}`); renderPresenca(rows||[]); } catch(e) {}
}
function renderPresenca(rows) {
  const agora = Date.now();
  const div = document.getElementById("presenca-lista");
  if (!rows.length) { div.innerHTML = ""; return; }
  div.innerHTML = rows
    .filter(r => !banidos.has(r.nome.toLowerCase()) || r.nome.toLowerCase()===ADMIN_NOME.toLowerCase())
    .sort((a,b) => { const aA=a.nome.toLowerCase()===ADMIN_NOME.toLowerCase(), bA=b.nome.toLowerCase()===ADMIN_NOME.toLowerCase(); if(aA&&!bA)return -1; if(!aA&&bA)return 1; return a.nome.localeCompare(b.nome); })
    .map(r => {
      const online = (agora - new Date(r.visto_em).getTime()) < 90000;
      const isAdm = r.nome.toLowerCase() === ADMIN_NOME.toLowerCase();
      const banivel = isAdmin() && !isAdm;
      return `<div class="presenca-chip${banivel?" banivel":""}" ${banivel?`onclick="banirUsuario('${escAttr(r.nome)}')" title="Segurar para remover"`:""}><div class="presenca-dot ${online?"online":"offline"}"></div>${escHtml(isAdm?nomeComTag(r.nome):r.nome)}</div>`;
    }).join("");
}

// ── Sala entrar/sair ──
function salaTab(tab) {
  document.querySelectorAll(".sala-tab").forEach((b,i) => b.classList.toggle("active", ["tarefas","chat"][i]===tab));
  document.querySelectorAll(".sala-tab-pane").forEach(p => p.classList.remove("active"));
  document.getElementById("sala-pane-"+tab).classList.add("active");
  if (tab==="chat") {
    carregarChat(true);
    setTimeout(() => document.getElementById("chat-msgs").scrollTop=99999, 100);
    notifMsgCount = 0; atualizarBadgeSala();
  }
}

function entrarSala(id, apelido) {
  salaId=id; salaApelido=apelido;
  localStorage.setItem("sala_id",id); localStorage.setItem("sala_apelido",apelido);
  document.getElementById("sala-setup-screen").style.display="none";
  document.getElementById("sala-ativa-screen").style.display="block";
  document.getElementById("sala-nome-display").textContent = "Sala "+apelido+(isAdmin()?" "+ADMIN_TAG:"");
  const codeEl = document.getElementById("sala-codigo-display");
  codeEl.textContent = apelido;
  codeEl.onclick = () => navigator.clipboard?.writeText(apelido).then(()=>showToast("Código copiado!"));
  carregarSalaTarefas(); carregarChat(true); carregarPresenca(); carregarBanidos(); registrarPresenca();
  clearInterval(pollInterval); clearInterval(chatPollInterval); clearInterval(presencaInterval); clearInterval(notifInterval);
  pollInterval = setInterval(() => { carregarSalaTarefas(); carregarBanidos(); }, 5000);
  chatPollInterval = setInterval(() => carregarChat(), 3000);
  presencaInterval = setInterval(() => { registrarPresenca(); carregarPresenca(); }, 30000);
  notifInterval = setInterval(() => { checarNovasMensagens(); checarNovasTarefas(); }, 4000);
}

function sairSala(forçado = false) {
  clearInterval(pollInterval); clearInterval(chatPollInterval); clearInterval(presencaInterval); clearInterval(notifInterval);
  salaId=""; salaApelido="";
  localStorage.removeItem("sala_id"); localStorage.removeItem("sala_apelido");
  document.getElementById("sala-setup-screen").style.display="block";
  document.getElementById("sala-ativa-screen").style.display="none";
}

document.getElementById("btn-criar-sala").onclick = () => {
  nomeUsuario = document.getElementById("input-nome-usuario").value.trim();
  if (!nomeUsuario) { showToast("Coloca seu nome primeiro"); return; }
  localStorage.setItem("nome_usuario", nomeUsuario);
  const codigo = gerarCodigo();
  entrarSala(codigo, codigo); showToast("Sala criada! Código: "+codigo);
};
document.getElementById("btn-entrar-sala").onclick = async () => {
  nomeUsuario = document.getElementById("input-nome-usuario").value.trim();
  if (!nomeUsuario) { showToast("Coloca seu nome primeiro"); return; }
  localStorage.setItem("nome_usuario", nomeUsuario);
  const codigo = document.getElementById("input-codigo").value.trim().toUpperCase();
  if (!codigo) { showToast("Coloca o código da sala"); return; }
  // checar se está banido
  try {
    const rows = await sbFetch(`/sala_banidos?sala_id=eq.${codigo}&nome=eq.${encodeURIComponent(nomeUsuario)}`);
    if (rows && rows.length > 0) { showToast("Você não pode entrar nesta sala ☠︎"); return; }
  } catch(e) {}
  entrarSala(codigo, codigo);
};
document.getElementById("btn-sair-sala").onclick = () => sairSala();

if (nomeUsuario) document.getElementById("input-nome-usuario").value = nomeUsuario;
if (salaId) setTimeout(() => entrarSala(salaId, salaApelido), 100);

// ══ CONFIRM ══
let confirmCallback = null;
function confirmar(titulo, msg, cb) {
  document.getElementById("confirm-title").textContent = titulo;
  document.getElementById("confirm-msg").textContent = msg;
  confirmCallback = cb;
  document.getElementById("confirm-overlay").classList.remove("hidden");
}
function confirmarSim() { document.getElementById("confirm-overlay").classList.add("hidden"); if (confirmCallback) confirmCallback(); confirmCallback = null; }
function confirmarNao() { document.getElementById("confirm-overlay").classList.add("hidden"); confirmCallback = null; }

// ══ NAV ══
function navTo(page) {
  document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
  document.querySelectorAll(".nav-btn").forEach(b => b.classList.remove("active"));
  document.getElementById("page-"+page).classList.add("active");
  document.getElementById("nav-"+page).classList.add("active");
  if (page === "sala") { notifTarefaCount = 0; atualizarBadgeSala(); }
}

// ══ UTILS ══
function uid() { return Math.random().toString(36).slice(2)+Date.now().toString(36); }
function gerarCodigo() { return Math.random().toString(36).slice(2,8).toUpperCase(); }
function escHtml(s) { return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }
function escAttr(s) { return String(s).replace(/'/g,"\\'").replace(/"/g,"&quot;").replace(/</g,"&lt;"); }
let toastTimer;
function showToast(msg) { const t=document.getElementById("toast"); t.textContent=msg; t.classList.add("show"); clearTimeout(toastTimer); toastTimer=setTimeout(()=>t.classList.remove("show"),2500); }
</script>

<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => { navigator.serviceWorker.register('sw.js').catch(()=>{}); });
}
</script>
